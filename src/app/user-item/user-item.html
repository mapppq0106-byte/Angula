<div class="card mb-2" style="cursor: pointer;" (click)="selectUser.emit(user())">
  <div class="card-body d-flex justify-content-between align-items-center">
    <div>
      <h6 class="card-title mb-1">{{ user().name }}</h6>
      <small class="card-text text-muted">{{ user().email }}</small>
    </div>
    <div>
      <button class="btn btn-sm btn-outline-primary me-2" (click)="edit.emit(user()); $event.stopPropagation()">Edit</button>
      <button class="btn btn-sm btn-outline-danger" (click)="delete.emit(user()); $event.stopPropagation()">Delete</button>
    </div>
  </div>
</div>
