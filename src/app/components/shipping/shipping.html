<div class="card shadow-sm border-0 p-4 shipping-card">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <h6 class="text-muted small fw-bold">SHIPPING STATUS</h6>
    <span class="small text-muted">Goal: <b>${{goal}}</b></span>
  </div>
  
  <p class="mb-3" *ngIf="currentTotal < goal">
    You're only <b>${{goal - currentTotal}}</b> away from Free Shipping!
  </p>
  <p class="mb-3" *ngIf="currentTotal >= goal">
    Congrats! You've unlocked <b>Free Shipping</b> 🥳
  </p>

  <div class="progress-container">
    <div class="progress-bar" [style.width.%]="progress">
      <div class="truck-icon" [style.left.%]="100">
        <i class="bi bi-truck">🚕</i>
      </div>
    </div>
  </div>
</div>
