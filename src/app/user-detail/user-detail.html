<div class="card shadow-sm border-0">
  <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center py-3">
    <h5 class="mb-0 fw-bold">User Details</h5>
    <button class="btn btn-sm btn-outline-secondary px-3" (click)="back.emit()">Back</button>
  </div>
  <div class="card-body p-4">
    <div class="d-flex align-items-center mb-4">
      <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex justify-content-center align-items-center me-3" style="width: 60px; height: 60px;">
        <span class="fs-4 fw-bold">{{ user().name.charAt(0) }}</span>
      </div>
      <div>
        <h4 class="card-title fw-bold mb-1">{{ user().name }}</h4>
        <p class="card-text text-muted mb-0">{{ user().email }}</p>
      </div>
    </div>
    
    <div class="card bg-light border-0">
      <ul class="list-group list-group-flush bg-transparent">
        <li class="list-group-item bg-transparent d-flex justify-content-between align-items-center py-3 border-bottom-0">
          <span class="text-muted fw-semibold">ID</span>
          <span class="fw-medium">{{ user().id }}</span>
        </li>
        <li class="list-group-item bg-transparent d-flex justify-content-between align-items-center py-3 border-bottom-0">
          <span class="text-muted fw-semibold">Gender</span>
          <span class="fw-medium text-capitalize">{{ user().gender }}</span>
        </li>
        <li class="list-group-item bg-transparent d-flex justify-content-between align-items-center py-3">
          <span class="text-muted fw-semibold">Status</span>
          <span class="badge rounded-pill px-3 py-2" [class.bg-success]="user().status === 'active'" [class.bg-secondary]="user().status === 'inactive'">
            {{ user().status }}
          </span>
        </li>
      </ul>
    </div>
  </div>
</div>
