<div class="summary-card p-4 text-white">
  <h4 class="fw-bold mb-4">Order Summary</h4>
  
  <div class="d-flex justify-content-between mb-3 info-row">
    <span class="text-secondary-light">Subtotal (Items)</span>
    <span class="fw-bold">${{subtotal | number:'1.2-2'}}</span>
  </div>

  <div class="d-flex justify-content-between mb-3 info-row">
    <span class="text-secondary-light">Shipping</span>
    <span class="fw-bold text-uppercase">{{ shipping === 0 ? 'Free' : ('$' + (shipping | number:'1.2-2')) }}</span>
  </div>

  @if (discount > 0) {
    <div class="d-flex justify-content-between mb-4 info-row text-success-light">
      <span class="text-secondary-light">Voucher Discount</span>
      <span class="fw-bold">-${{discount | number:'1.2-2'}}</span>
    </div>
  }

  <hr class="opacity-25 my-4">

  <div class="total-section mb-4">
    <span class="d-block small text-secondary-light mb-1">Total Price</span>
    <h1 class="display-6 fw-bold mb-0">${{total | number:'1.2-2'}}</h1>
  </div>

  <button class="btn btn-checkout w-100 py-3 fw-bold mb-3">
    Checkout Now
  </button>

  <div class="secure-footer text-center">
    <i class="bi bi-shield-lock me-1"></i>
    <span>SECURE CHECKOUT WITH 256-BIT SSL</span>
  </div>
</div>
