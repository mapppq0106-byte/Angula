<div class="card">
  <div class="card-header">
    <h5 class="mb-0">Create New User</h5>
  </div>
  <div class="card-body">
    <form (submit)="$event.preventDefault()">
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" [value]="formData().name" (input)="updateField('name', $any($event.target).value)" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" [value]="formData().email" (input)="updateField('email', $any($event.target).value)" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Gender</label>
        <select class="form-select" [value]="formData().gender" (change)="updateField('gender', $any($event.target).value)">
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Status</label>
        <select class="form-select" [value]="formData().status" (change)="updateField('status', $any($event.target).value)">
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
      <div class="d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-secondary" (click)="cancel.emit()">Cancel</button>
        <button type="button" class="btn btn-primary" (click)="onSubmit()" [disabled]="!isValid() || submitting()">
          @if (submitting()) {
            <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          }
          Create
        </button>
      </div>
    </form>
  </div>
</div>
